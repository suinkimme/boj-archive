name: Deploy Legacy Site

# Publishes the static archive (legacy/) to GitHub Pages.
# Required one-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'legacy/**'
      - '.github/workflows/deploy-legacy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy legacy/ to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: legacy
      - id: deployment
        uses: actions/deploy-pages@v4
